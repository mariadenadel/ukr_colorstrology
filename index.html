    <title>Кольори днів року</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
      }

      h1 {
        text-align: center;
        padding: 20px;
        font-weight: 400;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
        padding: 20px;
      }

      .tile {
        border-radius: 14px;
        height: 140px;
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        align-items: flex-end;
        position: relative;
        color: #fff;
        overflow: hidden;
      }

      .text {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .date {
        font-size: 12px;
        opacity: 0.9;
      }

      .name {
        font-weight: bold;
      }

      /* 👇 tooltip */
      .tooltip {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10px;

        opacity: 0;
        transition: opacity 0.2s ease;
        font-size: 13px;
      }

      .tile:hover .tooltip {
        opacity: 1;
      }
    </style>
  </head>
